# Probot Settings — https://github.com/repository-settings/app
# Applied automatically when the Settings GitHub App is installed.

repository:
  name: azure-storage-cost-explorer
  description: "CLI tool to retrieve Azure Storage costs and usage across Blob, File, Queue, and Table services."
  homepage: ""
  topics: azure, azure-storage, blob-storage, go, golang, cli, cost-management, cloud
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true

labels:
  - name: bug
    color: "d73a4a"
    description: Something isn't working
  - name: enhancement
    color: "a2eeef"
    description: New feature or request
  - name: documentation
    color: "0075ca"
    description: Improvements or additions to documentation
  - name: dependencies
    color: "0366d6"
    description: Pull requests that update a dependency file
  - name: good first issue
    color: "7057ff"
    description: Good for newcomers
  - name: help wanted
    color: "008672"
    description: Extra attention is needed
  - name: question
    color: "d876e3"
    description: Further information is requested
  - name: wontfix
    color: "ffffff"
    description: This will not be worked on
  - name: duplicate
    color: "cfd3d7"
    description: This issue or pull request already exists

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - "Build & Vet"
          - "Test"
      enforce_admins: false
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
